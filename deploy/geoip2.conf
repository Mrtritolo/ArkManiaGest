# /etc/nginx/conf.d/geoip2.conf
# GeoIP country-level access control
# Placeholders __GEOIP_COUNTRIES__ and __GEOIP_WHITELIST__ are replaced
# by full-deploy.sh from deploy.conf values.

geoip2 /usr/share/GeoIP/dbip-country-lite.mmdb {
    auto_reload 24h;
    $geoip2_data_country_code country iso_code;
}

# 1 = allowed country
map $geoip2_data_country_code $geo_allowed {
    default 0;
__GEOIP_COUNTRIES__
}

# 1 = whitelisted IP (bypasses geo-block regardless of country)
geo $ip_whitelist {
    default         0;
    127.0.0.1/32    1;
    ::1/128         1;
__GEOIP_WHITELIST__
}

# Final decision: block if country is NOT allowed AND IP is NOT whitelisted
map "$geo_allowed:$ip_whitelist" $geoip_block_access {
    "0:0"   1;      # Not allowed country + not whitelisted = BLOCK
    default 0;      # Everything else = ALLOW
}
