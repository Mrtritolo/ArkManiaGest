# /etc/fail2ban/jail.d/arkmaniagest.conf
# Fail2Ban jails per ArkManiaGest

[sshd]
enabled = true
port = ssh
maxretry = 3
bantime = 3600
findtime = 600

[nginx-limit-req]
enabled = true
port = http,https
logpath = /var/log/nginx/error.log
maxretry = 10
bantime = 600
findtime = 60

[nginx-http-auth]
enabled = true
port = http,https
logpath = /var/log/nginx/error.log
maxretry = 5
bantime = 3600

[arkmaniagest-auth]
# Protects login and setup endpoints against brute-force.
# Filter: deploy/fail2ban-filter.conf  |  logpath: nginx access log.
enabled = true
port = http,https
logpath = /var/log/nginx/access.log
filter = arkmaniagest-auth
maxretry = 5
bantime = 3600
findtime = 300
