# ============================================
# Nginx — ArkManiaGest Production
# Placeholders replaced by full-deploy.sh:
#   __DOMAIN__         → server domain
#   __APP_DIR__        → application directory
#   __PUBLIC_ORIGIN__  → public site CORS origin (or removed if empty)
# ============================================

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/s;

# ---- HTTP → HTTPS redirect ----
server {
    listen 80;
    server_name __DOMAIN__;
    server_tokens off;

    # Certbot renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS server ----
server {
    listen 443 ssl http2;
    server_name __DOMAIN__;
    server_tokens off;

    # ---- SSL ----
    ssl_certificate /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ---- Max upload size ----
    # 100M leaves headroom for Beacon's complete .beacondata export
    # (~12 MB today) plus the JSON-import endpoint and any future bulk
    # blueprint uploads.  Backend has its own 50 MB cap; nginx must be
    # at least that high otherwise 413 Request Entity Too Large is
    # served before the upload reaches uvicorn.
    client_max_body_size 100M;

    # ---- Security Headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ---- Gzip ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # ---- Public API (NO GeoIP, CORS open for public site) ----
    # This block MUST come BEFORE /api/ for priority
    location /api/v1/public/ {
        # Preflight OPTIONS — immediate response without proxy
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '__PUBLIC_ORIGIN__' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, X-API-Key' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain';
            return 204;
        }

        # CORS headers on normal responses
        add_header 'Access-Control-Allow-Origin' '__PUBLIC_ORIGIN__' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, X-API-Key' always;

        limit_req zone=api burst=20 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ---- Frontend SPA (GeoIP protected) ----
    location / {
        if ($geoip_block_access) {
            return 403;
        }

        root __APP_DIR__/frontend/dist;
        try_files $uri $uri/ /index.html;

        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ---- API Backend (GeoIP protected) ----
    location /api/ {
        if ($geoip_block_access) {
            return 403;
        }

        limit_req zone=api burst=50 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
    }

    # ---- Auth (strict rate limit + GeoIP) ----
    location ~ ^/api/v1/(auth/login|settings/setup) {
        if ($geoip_block_access) {
            return 403;
        }

        limit_req zone=auth burst=5 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Health check ----
    location /health {
        proxy_pass http://127.0.0.1:8000;
        access_log off;
    }

    # ---- Block sensitive files ----
    location ~ /\. { deny all; }
    location ~ \.(vault|env|key|pem|py|cjs|sh)$ { deny all; }
    location ~ (__pycache__|node_modules|\.git) { deny all; }
}
