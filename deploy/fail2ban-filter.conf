[Definition]
# Match failed POST requests to the login and initial-setup endpoints.
# The vault system was removed in v2.2.0; secrets are now stored in .env.
# Triggered on 401 / 403 / 422 responses (wrong credentials or validation errors).
failregex = ^<HOST> - .* "POST /api/v1/auth/login.*"     (401|403|422) .*$
            ^<HOST> - .* "POST /api/v1/settings/setup.*" (40[0-9]|422) .*$
ignoreregex =
