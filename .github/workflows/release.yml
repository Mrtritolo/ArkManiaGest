name: Release

# Triggered when a tag matching v* is pushed (e.g. v2.3.0).  Builds the
# frontend, stages a self-contained bundle, and attaches the Linux
# tarball + Windows zip + SHA256SUMS.txt to the GitHub Release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to package (without leading v)'
        required: true
        type: string

jobs:
  build:
    name: Build release artefacts
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required for softprops/action-gh-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Stage build tree (reusable base — keeps .ps1/.bat helpers)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          # Shared base that both artefacts copy from.  We deliberately DO NOT
          # apply the Windows-only script excludes here: the Windows zip needs
          # .ps1/.bat so deploy-remote.ps1 works.  The Linux tarball step
          # prunes those files right before tar-ing.
          BASE="release-build/_stage"
          rm -rf release-build
          mkdir -p "$BASE"

          # Build the rsync exclude list from .deployignore, BUT strip any
          # patterns that target Windows-only scripts (those are kept for
          # the Windows artefact and pruned later for Linux).
          if [ -f deploy/.deployignore ]; then
            mapfile -t EX < <(
              grep -v '^\s*#' deploy/.deployignore \
                | grep -v '^\s*$' \
                | grep -Ev '\*\.(ps1|bat|vbs)$'
            )
          else
            EX=(node_modules venv __pycache__ .git reference release-build)
          fi
          # Always exclude the build cache + the freshly-built frontend/dist
          # (we re-copy the latter straight after).
          EX+=("release-build" "dist/")
          EX_ARGS=()
          for e in "${EX[@]}"; do EX_ARGS+=("--exclude=$e"); done

          rsync -a "${EX_ARGS[@]}" ./ "$BASE/"

          # Force-include the freshly built frontend dist
          mkdir -p "$BASE/frontend/dist"
          cp -r frontend/dist/. "$BASE/frontend/dist/"

          # Write VERSION manifest
          cat > "$BASE/VERSION.json" <<EOF
          {
            "version": "${VERSION}",
            "commit": "${GITHUB_SHA}",
            "branch": "${GITHUB_REF_NAME}",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "pre_release": false
          }
          EOF

          echo "Staged files: $(find "$BASE" -type f | wc -l)"
          echo "PowerShell scripts in deploy/: $(find "$BASE/deploy" -maxdepth 1 -name '*.ps1' | wc -l)"

      - name: Create Linux tarball
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          DIR_NAME="arkmaniagest-v${VERSION}"
          cd release-build
          cp -r _stage "$DIR_NAME"
          # Linux servers don't need the Windows deploy helpers.
          find "$DIR_NAME" -type f \( -name '*.ps1' -o -name '*.bat' -o -name '*.vbs' \) -delete
          tar -czf "${DIR_NAME}-linux.tar.gz" "$DIR_NAME"
          rm -rf "$DIR_NAME"

      - name: Create Windows zip
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          DIR_NAME="arkmaniagest-v${VERSION}"
          cd release-build
          cp -r _stage "$DIR_NAME"
          # Full tree including .ps1/.bat helpers for deploy-remote.ps1 etc.
          zip -rq "${DIR_NAME}-windows.zip" "$DIR_NAME"
          rm -rf "$DIR_NAME"

      - name: Generate SHA256SUMS
        working-directory: release-build
        run: |
          set -euo pipefail
          rm -rf _stage
          sha256sum *.tar.gz *.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Extract release notes
        id: notes
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          # Pull the section for this version from CHANGELOG.md.  Matches the
          # heading "## [X.Y.Z]" and captures everything until the next "## "
          # heading or end of file.
          if [ -f CHANGELOG.md ]; then
            awk -v v="$VERSION" '
              /^## \[/ {
                if (printing) exit
                if ($0 ~ "\\[" v "\\]") { printing=1; print; next }
              }
              printing { print }
            ' CHANGELOG.md > release-build/BODY.md
          fi
          if [ ! -s release-build/BODY.md ]; then
            echo "## ArkManiaGest v${VERSION}" > release-build/BODY.md
            echo "" >> release-build/BODY.md
            echo "See [CHANGELOG.md](CHANGELOG.md) for the full list of changes." >> release-build/BODY.md
          fi
          {
            echo ""
            echo "---"
            echo ""
            echo "### Downloads"
            echo ""
            echo "| Platform | File | Deploy command |"
            echo "|---|---|---|"
            echo "| Linux server | \`arkmaniagest-v${VERSION}-linux.tar.gz\` | \`tar -xzf … && sudo bash deploy/full-deploy.sh\` |"
            echo "| Windows dev PC | \`arkmaniagest-v${VERSION}-windows.zip\` | Unzip, then run \`deploy\\deploy-remote.ps1\` |"
            echo ""
            echo "Verify with \`SHA256SUMS.txt\`."
            echo ""
            echo "> **License reminder:** ArkManiaGest is distributed under the"
            echo "> [ArkManiaGest Source-Available License v1.0](LICENSE)."
            echo "> Commercial use is prohibited; deployment requires written"
            echo "> authorisation from Lomatek / ArkMania.it (info@arkmania.it)."
          } >> release-build/BODY.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ArkManiaGest ${{ steps.ver.outputs.tag }}
          body_path: release-build/BODY.md
          files: |
            release-build/arkmaniagest-v${{ steps.ver.outputs.version }}-linux.tar.gz
            release-build/arkmaniagest-v${{ steps.ver.outputs.version }}-windows.zip
            release-build/SHA256SUMS.txt
          draft: false
          prerelease: ${{ contains(steps.ver.outputs.version, 'rc') || contains(steps.ver.outputs.version, 'beta') || contains(steps.ver.outputs.version, 'alpha') }}
